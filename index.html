<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🚀 Hola! Git y GitHub</title>
    <style>
        /* Centrado de todo el contenido */
        body {
            font-family: sans-serif; /* Tipografía limpia */
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh; /* Ocupar toda la altura de la ventana */
            margin: 0;
            background-color: #fafafa; /* Color de fondo suave */
        }

        /* Estilo del contenedor principal */
        .container {
            background-color: #fff; /* Color de fondo del contenedor */
            padding: 40px;
            border-radius: 15px; /* Bordes redondeados */
            box-shadow: 0 4px 8px rgba(0,0,0,0.1); /* Sutil sombra */
            text-align: center; /* Centrar texto dentro */
            max-width: 600px; /* Ancho máximo para legibilidad */
            width: 90%; /* Ancho receptivo */
        }

        /* Estilo del título principal */
        h1 {
            color: #333; /* Color de texto oscuro */
            margin-bottom: 20px;
            font-size: 2.5em; /* Tamaño grande */
            font-weight: bold;
        }

        /* Estilo de la descripción */
        p {
            color: #555; /* Color de texto descripción más suave */
            font-size: 1.2em;
            line-height: 1.6; /* Interlineado para legibilidad */
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🚀 Gran Inauguración de mi Cuenta!</h1>
        <p>¡Comenzando mi emocionante viaje aprendiendo control de versiones con Git y la magia de GitHub!</p>
    </div>
</body>
</html>
